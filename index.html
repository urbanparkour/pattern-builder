<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pattern Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            padding: 20px;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* Tablet optimization */
        @media (min-width: 768px) and (max-width: 1200px) {
            .logo {
                max-width: 80%;
                max-height: 80%;
            }
        }

        /* Desktop */
        @media (min-width: 1200px) {
            .logo {
                max-width: 70%;
                max-height: 80%;
            }
        }

        /* Mobile */
        @media (max-width: 767px) {
            .logo {
                max-width: 95%;
                max-height: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Pattern Builder Logo.png" alt="Pattern Builder" class="logo">
    </div>
</body>
</html>
