<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pattern Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Bubblegum Sans', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #FFFFFF;
            padding: 15px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 1;
            animation: slideIn 0.8s ease-out;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            max-width: 700px;
            width: 90%;
            margin: 0 auto;
            display: block;
        }

        /* ===== CLASS SELECTOR SECTION (DROPDOWN) ===== */
        .class-selector {
            margin: 10px auto 30px auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
            transition: all 0.3s ease;
        }

        .class-dropdown {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 12px 25px;
            border: 3px solid #ffd700;
            border-radius: 50px;
            background: #1a3a5f;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            text-align: center;
        }

        .class-dropdown:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #0f2a44;
        }

        .class-dropdown option {
            background: white;
            color: #333;
        }

        /* ===== MODE BUTTONS SECTION ===== */
        .mode-buttons {
            display: flex;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .mode-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            flex: 1 1 auto;
            min-width: 250px;
            max-width: 350px;
            line-height: 1.3;
            text-align: center;
        }

        .mode-btn.team-mode {
            background: linear-gradient(145deg, #1A3A5F, #0F2A44);
            border: 2px solid #2B4F7C;
        }

        .mode-btn.battle-mode {
            background: linear-gradient(145deg, #6B4E9E, #4A2C7A);
            border: 2px solid #8A6CC7;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .mode-btn:hover::before {
            width: 600px;
            height: 600px;
        }

        .mode-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        .mode-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .mode-icon {
            font-size: 28px;
            margin-right: 12px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* ===== TABLET & MOBILE OPTIMIZATIONS ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 600px;
                width: 85%;
            }
            
            .class-dropdown {
                font-size: 18px;
                padding: 10px 20px;
                min-width: 180px;
            }
            
            .mode-btn {
                font-size: 18px;
                padding: 18px 25px;
                min-width: 220px;
            }
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding-top: 30px;
            }
            
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 500px;
                width: 80%;
                margin-bottom: 5px;
            }
            
            .class-selector {
                flex-direction: column;
                gap: 10px;
                margin: 5px auto 20px auto;
            }
            
            .class-dropdown {
                width: 250px;
                font-size: 16px;
                padding: 12px 20px;
            }
            
            .mode-buttons {
                flex-direction: column;
                gap: 15px;
                align-items: center;
                margin-top: 15px;
            }
            
            .mode-btn {
                font-size: 18px;
                padding: 18px 20px;
                min-width: 280px;
                width: 100%;
                max-width: 320px;
            }
            
            .mode-icon {
                font-size: 24px;
                margin-right: 10px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                max-width: 400px;
                width: 95%;
            }
            
            .class-dropdown {
                width: 220px;
                font-size: 14px;
                padding: 10px 15px;
            }
            
            .mode-btn {
                font-size: 16px;
                padding: 15px 15px;
                min-width: 240px;
            }
            
            .mode-icon {
                font-size: 22px;
                margin-right: 8px;
            }
        }

        /* Landscape orientation on tablets */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                align-items: center;
                padding: 10px;
            }
            
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 400px;
                width: 60%;
            }
            
            .class-selector {
                flex-direction: row;
                margin: 5px auto;
            }
            
            .class-dropdown {
                padding: 8px 15px;
                font-size: 14px;
                min-width: 120px;
            }
            
            .mode-buttons {
                flex-direction: row;
                margin-top: 10px;
            }
            
            .mode-btn {
                padding: 12px 15px;
                font-size: 14px;
                min-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="Pattern Builder Logo.png" alt="Pattern Builder" class="logo">
        </div>

        <!-- CLASS SELECTOR - DROPDOWN -->
        <div class="class-selector">
            <select id="classDropdown" class="class-dropdown">
                <option value="">-- Select Class --</option>
                <option value="2pm">2:00 PM Class</option>
                <option value="3pm">3:00 PM Class</option>
                <option value="4pm">4:00 PM Class</option>
                <option value="5pm">5:00 PM Class</option>
            </select>
        </div>

        <!-- TWO GAME MODE BUTTONS -->
        <div class="mode-buttons">
            <a href="mode1.html" class="mode-btn team-mode" id="teamBuzzLink">
                <span class="mode-icon">🧩</span>
                Round 1:<br>Pattern Builder
            </a>
            <a href="mode2.html" class="mode-btn battle-mode" id="ultimateBattleLink">
                <span class="mode-icon">👑</span>
                Round 2:<br>Ultimate Battle
            </a>
        </div>
    </div>

    <script>
        // CSV files for each class
        const CSV_FILES = {
            '2pm': '2pm.csv',
            '3pm': '3pm.csv',
            '4pm': '4pm.csv',
            '5pm': '5pm.csv'
        };
        
        // Get elements
        const classDropdown = document.getElementById('classDropdown');
        const teamBuzzLink = document.getElementById('teamBuzzLink');
        const ultimateBattleLink = document.getElementById('ultimateBattleLink');
        
        // Function to update localStorage when class is selected
        function setActiveClass(classValue) {
            if (classValue) {
                localStorage.setItem('megaScrambleClass', classValue);
                localStorage.setItem('megaScrambleCSV', CSV_FILES[classValue]);
            } else {
                localStorage.removeItem('megaScrambleClass');
                localStorage.removeItem('megaScrambleCSV');
            }
        }
        
        // Handle class dropdown change
        classDropdown.addEventListener('change', function() {
            const selectedOption = classDropdown.value;
            setActiveClass(selectedOption);
        });
        
        // Handle mode links - ensure class is selected before proceeding
        teamBuzzLink.addEventListener('click', function(e) {
            const selectedClass = localStorage.getItem('megaScrambleClass');
            if (!selectedClass) {
                e.preventDefault();
                alert('⚠️ Please select a class first! (2pm, 3pm, 4pm, or 5pm)');
            }
        });
        
        ultimateBattleLink.addEventListener('click', function(e) {
            const selectedClass = localStorage.getItem('megaScrambleClass');
            if (!selectedClass) {
                e.preventDefault();
                alert('⚠️ Please select a class first! (2pm, 3pm, 4pm, or 5pm)');
            }
        });
        
        // Restore previously selected class if exists
        const savedClass = localStorage.getItem('megaScrambleClass');
        if (savedClass) {
            classDropdown.value = savedClass;
        }
    </script>
</body>
</html>
