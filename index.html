<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pattern Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            padding: 20px;
            font-family: 'Noto Sans KR', 'Bubblegum Sans', cursive, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            max-width: 800px;
            margin: 0 auto;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            max-width: 90%;
            max-height: 55vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            flex-shrink: 0;
        }

        .class-selector {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .class-dropdown {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 14px 25px;
            border: 3px solid #FFD700;
            border-radius: 50px;
            background: #1A3A5F;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 20px;
            padding-right: 50px;
        }

        .class-dropdown:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #0f2a44;
        }

        .class-dropdown option {
            background: white;
            color: #333;
            padding: 10px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .start-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 16px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.15s ease;
            flex: 1;
            min-width: 160px;
            max-width: 220px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            filter: brightness(1.05);
        }

        .start-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .start-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1) !important;
        }

        .btn-team {
            background: linear-gradient(145deg, #FF6B6B, #E74C3C);
            box-shadow: 0 6px 0 #B03A2E;
        }

        .btn-team:hover:not(:disabled) {
            box-shadow: 0 8px 16px rgba(231, 76, 60, 0.4), 0 6px 0 #B03A2E;
        }

        .btn-elimination {
            background: linear-gradient(145deg, #6C5CE7, #4834D4);
            box-shadow: 0 6px 0 #341F97;
        }

        .btn-elimination:hover:not(:disabled) {
            box-shadow: 0 8px 16px rgba(108, 92, 231, 0.4), 0 6px 0 #341F97;
        }

        @media (max-width: 768px) {
            .logo { max-width: 80%; max-height: 45vh; }
            .container { gap: 20px; }
            .class-dropdown { font-size: 18px; padding: 12px 22px; padding-right: 45px; }
            .start-btn { font-size: 18px; padding: 14px 20px; min-width: 140px; }
        }

        @media (max-width: 480px) {
            .logo { max-width: 95%; max-height: 35vh; }
            .container { gap: 15px; padding: 10px; }
            .controls { max-width: 320px; }
            .class-dropdown { font-size: 16px; padding: 12px 18px; padding-right: 40px; max-width: 300px; }
            .button-group { flex-direction: column; align-items: center; max-width: 300px; gap: 10px; }
            .start-btn { font-size: 16px; padding: 14px 20px; min-width: unset; max-width: 300px; width: 100%; }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .logo { max-height: 25vh; max-width: 50%; }
            .container { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 12px 25px; padding: 10px 20px; }
            .logo-container { flex: 0 0 auto; max-width: 35%; }
            .controls { flex: 0 0 auto; max-width: 50%; gap: 10px; }
            .class-dropdown { font-size: 14px; padding: 10px 16px; padding-right: 35px; max-width: 250px; }
            .button-group { flex-direction: row; max-width: 300px; gap: 10px; }
            .start-btn { font-size: 14px; padding: 10px 16px; min-width: 120px; max-width: 150px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="Pattern_Builder_Logo.png" alt="Pattern Builder" class="logo">
        </div>

        <div class="controls">
            <div class="class-selector">
                <select id="classDropdown" class="class-dropdown">
                    <option value="">-- Select Class --</option>
                    <option value="2pm">2:00 PM Class (A1)</option>
                    <option value="3pm">3:00 PM Class (A2)</option>
                    <option value="4pm">4:00 PM Class (B1)</option>
                    <option value="5pm">5:00 PM Class (Low A1)</option>
                </select>
            </div>

            <div class="button-group">
                <button class="start-btn btn-team" id="teamRoundBtn" disabled>🤝 Team Round</button>
                <button class="start-btn btn-elimination" id="eliminationRoundBtn" disabled>⚔️ Elimination</button>
            </div>
        </div>
    </div>

    <script>
        // CSV files for each class
        const CSV_FILES = {
            '2pm': '2pm.csv',
            '3pm': '3pm.csv',
            '4pm': '4pm.csv',
            '5pm': '5pm.csv'
        };
        
        // Get elements
        const classDropdown = document.getElementById('classDropdown');
        const teamRoundBtn = document.getElementById('teamRoundBtn');
        const eliminationRoundBtn = document.getElementById('eliminationRoundBtn');

        // Enable/disable buttons based on selection
        classDropdown.addEventListener('change', function() {
            if (this.value) {
                teamRoundBtn.disabled = false;
                eliminationRoundBtn.disabled = false;
            } else {
                teamRoundBtn.disabled = true;
                eliminationRoundBtn.disabled = true;
            }
        });

        // Function to handle navigation
        function navigateTo(mode) {
            const selectedClass = classDropdown.value;
            
            if (!selectedClass) {
                alert('⚠️ Please select a class first!');
                return;
            }

            // Store the selected class and CSV file in localStorage
            localStorage.setItem('megaScrambleClass', selectedClass);
            localStorage.setItem('megaScrambleCSV', CSV_FILES[selectedClass]);
            
            // Navigate to the selected mode
            if (mode === 'team') {
                window.location.href = 'mode1.html';
            } else if (mode === 'elimination') {
                window.location.href = 'mode2.html';
            }
        }

        // Team Round button click
        teamRoundBtn.addEventListener('click', function() {
            navigateTo('team');
        });

        // Elimination Round button click
        eliminationRoundBtn.addEventListener('click', function() {
            navigateTo('elimination');
        });

        // Restore previously selected class if exists
        const savedClass = localStorage.getItem('megaScrambleClass');
        if (savedClass) {
            classDropdown.value = savedClass;
            teamRoundBtn.disabled = false;
            eliminationRoundBtn.disabled = false;
        }
    </script>
</body>
</html>
