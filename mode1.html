<script>
/* ============================================================
   PATTERN BUILDER — MODE 1 (TEAM ROUND)
   ============================================================ */

const CLASS_LABELS = {
    '2pm': '2:00 PM Class (A1)',
    '3pm': '3:00 PM Class (A2)',
    '4pm': '4:00 PM Class (B1)',
    '5pm': '5:00 PM Class (Low A1)'
};

const selectedClass = localStorage.getItem('megaScrambleClass') || '2pm';
const csvFile = localStorage.getItem('megaScrambleCSV') || (selectedClass + '.csv');
$('#classDisplay').html('Class: <span>' + (CLASS_LABELS[selectedClass] || selectedClass) + '</span>');

/* ============================================================
   GRAMMAR-BASED AUTO-COLOR ENGINE  (vocabulary-independent)
   Yellow = Subject | Green = Verb | Blue = Object | White = rest
   Korean roles come from PARTICLES; English from closed-class
   words + position. Both are fixed grammar, so new weekly
   vocabulary keeps working without edits.
   ============================================================ */

/* ---------- KOREAN ---------- */
var KR_PRON = ['나는','저는','너는','당신은','그는','그녀는','우리는','너희는','내가','제가','네가','우리가'];
var KR_TAIL = ['거야','거니','거예요','거야?','거니?','것','거','래','수','줄','좋겠어','같아'];
var KR_WH   = /^(무엇|뭐|어디|누구|언제|왜|어떻게|몇|무슨)/;

function krStrip(w){ return (w||'').replace(/[.,!?;:"'’()]/g,'').trim(); }

function colorKorean(words){
    var n = words.length;
    var cls = new Array(n);
    for (var i=0;i<n;i++) cls[i] = 'color-white';
    if (!n) return cls;

    /* 1) VERB = final word, skipping trailing auxiliaries */
    var vi = n - 1;
    while (vi > 0 && KR_TAIL.indexOf(words[vi]) !== -1) vi--;
    cls[vi] = 'color-verb';

    /* 2) OBJECT = 을/를 marked */
    for (var j=0;j<vi;j++){
        if (/[을를]$/.test(words[j])) cls[j] = 'color-object';
    }

    /* 3) SUBJECT
          a) sentence-initial pronoun wins (나는/저는/너는 ...)
          b) else last 은/는/이/가 word before the verb,
             skipping interrogatives (무엇이/뭐가)                */
    var si = -1;
    if (KR_PRON.indexOf(words[0]) !== -1) {
        si = 0;
    } else {
        for (var k=vi-1;k>=0;k--){
            if (cls[k] !== 'color-white') continue;
            if (KR_WH.test(words[k])) continue;
            if (/[은는이가게]$/.test(words[k])) { si = k; break; }
        }
        /* fallback: allow interrogative to be subject */
        if (si === -1){
            for (var m=vi-1;m>=0;m--){
                if (cls[m] === 'color-white' && /[은는이가]$/.test(words[m])) { si = m; break; }
            }
        }
    }
    if (si >= 0) cls[si] = 'color-subject';

    /* 4) interrogative with a pronoun subject present -> object */
    if (si >= 0 && KR_PRON.indexOf(words[si]) !== -1){
        for (var p=0;p<vi;p++){
            if (p !== si && cls[p] === 'color-white' && KR_WH.test(words[p])) {
                cls[p] = 'color-object';
                break;
            }
        }
    }
    return cls;
}

/* ---------- ENGLISH ---------- */
var EN_PRON = ['i','you','he','she','we','they','it'];
var EN_AUX  = ['is','are','am','was','were','be','been','being','do','does','did',
               'have','has','had','can','could','will','would','shall','should',
               'may','might','must',"don't","doesn't","didn't","can't","won't",
               "isn't","aren't","wasn't","weren't","couldn't","shouldn't","wouldn't"];
var EN_DET  = ['the','a','an','my','your','his','her','its','our','their','this',
               'that','these','those','some','any','no','every','each','all','both','another'];
var EN_PREP = ['at','on','in','for','with','to','from','of','about','by','into','onto',
               'over','under','after','before','during','between','through','as','than','without','around'];
var EN_CONJ = ['and','or','but','so','because','if','when','while','that'];
var EN_ADV  = ['very','too','also','just','now','today','tomorrow','yesterday','here',
               'there','exactly','often','always','never','usually','sometimes','again',
               'well','together','outside','inside','early','late','soon','then','still',
               'only','really','quite','more','most','less','much','ever','yet','already','back'];
var EN_ADJ  = ['favorite','favourite','best','good','great','common','important','difficult',
               'strange','big','new','next','last','same','other','many','little','small',
               'young','old','easy','hard','right','wrong','free','busy','tired','sick',
               'ready','happy','sad','healthy','confident','biggest','favorites'];
var EN_WHC  = ["what's","who's","where's","when's","why's","how's","what’s","who’s","where’s"];
var EN_WH   = ['what','who','whom','where','when','why','how','which'];
var EN_ADJ_SUF = /(est|ful|ive|ous|able|ible|less|ish)$/;

function enStrip(w){ return (w||'').replace(/[.,!?;:"()]/g,'').trim().toLowerCase(); }
function inArr(a,w){ return a.indexOf(w) !== -1; }

function colorEnglish(words){
    var n = words.length;
    var raw = [], cls = new Array(n);
    for (var i=0;i<n;i++){ raw.push(enStrip(words[i])); cls[i] = 'color-white'; }
    if (!n) return cls;

    var hasPronSubj = false;
    for (var a=0;a<n;a++){ if (inArr(EN_PRON, raw[a])) { hasPronSubj = true; break; } }

    var startsWH = inArr(EN_WHC, raw[0]);           /* "What's ...?" */
    var mainVerbAt = -1;
    var inPP = false;          /* inside a prepositional phrase */
    var pronAt = {};           /* which subjects are pronouns   */

    for (var t=0;t<n;t++){
        var w = raw[t];
        if (!w) continue;

        /* contraction  I'm / I've  -> subject (pronoun dominates) */
        if (/^(i|you|he|she|we|they|it)['’](m|s|re|ve|ll|d)$/.test(w)) { cls[t]='color-subject'; pronAt[t]=true; continue; }

        /* "What's" = wh + copula -> verb (mirrors 무엇이니 / 뭐야) */
        if (inArr(EN_WHC, w)) { cls[t]='color-verb'; if(mainVerbAt<0) mainVerbAt=t; continue; }

        /* bare wh-word: object when a pronoun subject exists, else verb-ish */
        if (inArr(EN_WH, w)) { cls[t] = hasPronSubj ? 'color-object' : 'color-white'; continue; }

        if (inArr(EN_PRON, w)) { cls[t]='color-subject'; pronAt[t]=true; inPP=false; continue; }
        if (inArr(EN_AUX,  w)) { cls[t]='color-verb'; inPP=false; if(mainVerbAt<0) mainVerbAt=t; continue; }
        if (inArr(EN_PREP, w)) { inPP = true; continue; }
        if (inArr(EN_DET,  w) || inArr(EN_CONJ,w)) { continue; }
        /* possessive noun ("today's", "John's") acts as a determiner */
        if (/['’]s$/.test(w) && !inArr(EN_WHC, w)) { continue; }
        if (inArr(EN_ADV,  w) || inArr(EN_ADJ, w) || EN_ADJ_SUF.test(w)) { continue; }

        /* ---- content word: verb or noun ---- */
        var prev = t>0 ? raw[t-1] : '';
        var prevCls = t>0 ? cls[t-1] : '';
        var isVerb = false;

        if (prev === 'to') isVerb = true;                               /* to + V (infinitive) */
        else if (inArr(EN_AUX, prev)) isVerb = true;                    /* aux + V  */
        else if (prevCls === 'color-subject' && pronAt[t-1]) isVerb = true; /* pronoun + V */
        else if (/ing$/.test(w) && mainVerbAt >= 0 && !inPP
                 && !inArr(EN_DET, prev) && !/['’]s$/.test(prev)) isVerb = true;

        if (isVerb){
            cls[t] = 'color-verb';
            inPP = false;
            if (mainVerbAt < 0 || inArr(EN_WHC, raw[0])) mainVerbAt = t;
            continue;
        }

        /* noun */
        /* coordinated noun ("date and day") inherits the previous noun's role */
        if ((prev === 'and' || prev === 'or') && t >= 2){
            var back = t - 2;
            while (back >= 0 && cls[back] === 'color-white') back--;
            if (back >= 0 && (cls[back] === 'color-subject' || cls[back] === 'color-object')){
                cls[t] = cls[back];
                continue;
            }
        }
        if (inPP) { cls[t]='color-white'; continue; }                   /* inside prep. phrase */
        if (startsWH && mainVerbAt >= 0){                               /* "What's the TITLE" */
            cls[t] = 'color-subject';
            startsWH = false;
            continue;
        }
        if (mainVerbAt >= 0 && t > mainVerbAt) cls[t] = 'color-object';
        else cls[t] = 'color-subject';
    }

    /* fallback: a "What's ...?" sentence must show a subject somewhere */
    var haveSubj = false;
    for (var z=0;z<n;z++) if (cls[z] === 'color-subject') haveSubj = true;
    if (!haveSubj && inArr(EN_WHC, raw[0])){
        for (var y=n-1;y>=1;y--){
            if (cls[y] === 'color-white' && raw[y]
                && !inArr(EN_DET,raw[y]) && !inArr(EN_PREP,raw[y])
                && !inArr(EN_ADV,raw[y]) && !inArr(EN_ADJ,raw[y])
                && !/['’]s$/.test(raw[y])){
                cls[y] = 'color-subject';
                break;
            }
        }
    }
    return cls;
}

/* ---------- BUILD MAP ---------- */
function autoColorMap(korean, english){
    var map = {};
    var kw = korean.split(/\s+/).map(krStrip).filter(Boolean);
    var kc = colorKorean(kw);
    for (var i=0;i<kw.length;i++) map[kw[i]] = kc[i];

    var ew = english.split(/\s+/).filter(function(x){return x.length;});
    var ec = colorEnglish(ew);
    for (var j=0;j<ew.length;j++) map[enStrip(ew[j])] = ec[j];

    return map;
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderWordCloud(sentence, colorMap) {
    const words = sentence.split(/\s+/).filter(w => w.length > 0);
    const container = $('#wordCloud');
    container.empty();
    shuffleArray([...words]).forEach((word, index) => {
        const key = stripP(word);
        const colorClass = (colorMap && (colorMap[key] || colorMap[key.toLowerCase()])) || 'color-white';
        const block = $('<span class="word-block"></span>')
            .addClass(colorClass)
            .text(word)
            .css('animation-delay', (index * 0.06) + 's');
        if (word.length >= 3) block.addClass('long-word');
        container.append(block);
    });
}

function renderAnswer(sentence, colorMap) {
    const words = sentence.split(/\s+/).filter(w => w.length > 0);
    const container = $('#answerBlocks');
    container.empty();
    words.forEach((word, index) => {
        const key = stripP(word).toLowerCase();
        const colorClass = (colorMap && colorMap[key]) || 'color-white';
        const block = $('<span class="answer-word-block"></span>')
            .addClass(colorClass)
            .text(word)
            .css('animation-delay', (index * 0.06) + 's');
        if (word.length >= 6) block.addClass('long-word');
        container.append(block);
    });
}

// ----- GAME STATE -----
let questions = [];
let currentIndex = 0;
let timerInterval;
let timeRemaining = 900;

function updateTimerDisplay() {
    const m = Math.floor(timeRemaining / 60);
    const s = timeRemaining % 60;
    const d = $('#timerDisplay');
    d.text(String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'));
    if (timeRemaining <= 30) {
        d.addClass('warning');
        $('#timerBar').addClass('warning');
    } else {
        d.removeClass('warning');
        $('#timerBar').removeClass('warning');
    }
}

function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(function(){
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            $('#timesUpModal').fadeIn(300).css('display', 'flex');
            $('#timerBar').css('animation-play-state', 'paused');
        }
    }, 1000);
}

function showQuestion() {
    if (currentIndex >= questions.length) {
        endGame();
        return;
    }
    const q = questions[currentIndex];
    $('#questionNumber').text('Question ' + (currentIndex + 1) + ' of ' + questions.length);
    renderWordCloud(q.scrambled, q.colorMap);
    renderAnswer(q.correct, q.colorMap);
    $('#answerSection').hide();
    $('#showAnswerBtn').removeClass('hidden').show();
    $('#nextBtn').addClass('hidden');
    $('#finishBtn').addClass('hidden');
}

function endGame() {
    clearInterval(timerInterval);
    const a = parseInt($('#scoreA').val()) || 0;
    const b = parseInt($('#scoreB').val()) || 0;
    let winner;
    if (a > b) winner = '🔴 Team A';
    else if (b > a) winner = '🔵 Team B';
    else winner = "It's a Tie!";
    localStorage.setItem('megaScrambleWinner', winner);
    localStorage.setItem('megaScrambleGameEnded', 'true');
    window.location.href = 'winner.html';
}

$('#showAnswerBtn').on('click', function(){
    $('#answerSection').show();
    $(this).addClass('hidden');
    if (currentIndex >= questions.length - 1) {
        $('#finishBtn').removeClass('hidden');
    } else {
        $('#nextBtn').removeClass('hidden');
    }
});

$('#nextBtn').on('click', function(){
    currentIndex++;
    showQuestion();
});

$('#finishBtn').on('click', endGame);

$('#modalOkBtn').on('click', function() {
    $('#timesUpModal').hide();
    endGame();
});

// ----- LOAD CSV -----
$(document).ready(function () {
    Papa.parse(csvFile, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function (results) {
            const rows = results.data.filter(r =>
                (r['Scrambled sentence'] || '').trim() && (r['Answer'] || '').trim());
            if (!rows.length) {
                $('#wordCloud').html('<div style="color:#fff;font-size:16px;">⚠️ Could not load ' + csvFile + '.<br>Make sure it is in the same folder.</div>');
                return;
            }
            questions = shuffleArray(rows.map(r => {
                const kr = r['Scrambled sentence'].trim();
                const en = r['Answer'].trim();
                return { scrambled: kr, correct: en, colorMap: autoColorMap(kr, en) };
            }));
            showQuestion();
            startTimer();
        },
        error: function () {
            $('#wordCloud').html('<div style="color:#fff;font-size:16px;">⚠️ Error loading ' + csvFile + '.<br>Open via a web server (not file://) so the CSV can load.</div>');
        }
    });
});
