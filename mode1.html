<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pattern Builder - Round 1</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', 'Bubblegum Sans', cursive, sans-serif;
            background: linear-gradient(135deg, #1A3A5F, #0F2A44);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: auto;
        }

        .question-container {
            background: white;
            border-radius: 25px;
            padding: 15px 20px;
            max-width: 950px;
            width: 98%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            margin: 10px auto;
            max-height: 98vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border: 3px solid #FFD700;
        }

        .stage-title {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #1A3A5F;
            margin-bottom: 3px;
            flex-shrink: 0;
            text-shadow: 2px 2px 0 #FFD700;
        }

        .sub-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        .class-badge {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            flex-shrink: 0;
            background: #f0f0f0;
            display: inline-block;
            padding: 3px 16px;
            border-radius: 50px;
            margin-top: 2px;
        }

        .class-badge span {
            font-weight: bold;
            color: #1A3A5F;
        }

        .question-number {
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            color: #4ECDC4;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .word-cloud {
            background: linear-gradient(135deg, #1A3A5F, #2B4F7C);
            border-radius: 16px;
            padding: 20px 15px;
            min-height: 150px;
            margin-bottom: 10px;
            flex-shrink: 0;
            border: 2px solid #FFD700;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px 16px;
        }

        /* ===== LEGO BLOCK STYLES ===== */
        .word-block {
            font-family: 'Noto Sans KR', 'Fredoka One', cursive, sans-serif;
            font-size: 22px;
            font-weight: 700;
            padding: 10px 18px;
            color: #1A1A1A;
            display: inline-block;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            user-select: none;
            animation: floatIn 0.5s ease-out;
            animation-fill-mode: both;
            position: relative;
            border-radius: 5px;
            border-bottom: 7px solid rgba(0,0,0,0.25);
            box-shadow: 
                inset 0 -4px 0 rgba(0,0,0,0.1),
                0 4px 8px rgba(0,0,0,0.2);
            min-width: 55px;
            text-align: center;
        }

        .word-block::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: inherit;
            border-radius: 50% 50% 0 0;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                0 -2px 0 rgba(0,0,0,0.1);
            filter: brightness(1.15);
        }

        .word-block::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 30%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: inherit;
            border-radius: 50% 50% 0 0;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                0 -2px 0 rgba(0,0,0,0.1);
            filter: brightness(1.15);
            display: none;
        }

        .word-block.long-word::after {
            display: block;
        }

        .word-block:hover {
            transform: translateY(-6px) scale(1.04);
            box-shadow: 
                inset 0 -4px 0 rgba(0,0,0,0.1),
                0 8px 16px rgba(0,0,0,0.3);
        }

        .word-block:active {
            transform: scale(0.95) translateY(2px);
            border-bottom-width: 3px;
            box-shadow: 
                inset 0 -2px 0 rgba(0,0,0,0.1),
                0 2px 4px rgba(0,0,0,0.2);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.7) rotate(-8deg) translateY(20px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg) translateY(0); }
        }

        /* ===== COLOR SCHEME ===== */
        .color-subject { background: #FFD93D; border-bottom-color: #D4A017; }      /* Yellow - Subject */
        .color-verb { background: #2ED573; border-bottom-color: #1E8449; }          /* Green - Verb */
        .color-object { background: #FF4757; border-bottom-color: #C0392B; }        /* Red - Object */
        .color-adverb { background: #A66CFF; border-bottom-color: #7B2FBE; }        /* Purple - Adverb */
        .color-preposition { background: #FF8E53; border-bottom-color: #D35400; }   /* Orange - Preposition */
        .color-article { background: #F9A8D4; border-bottom-color: #C71585; }       /* Pink - Article */
        .color-adjective { background: #1E90FF; border-bottom-color: #1565C0; }     /* Blue - Adjective */
        .color-conjunction { background: #00D2D3; border-bottom-color: #00838F; }   /* Teal - Conjunction */
        .color-other { background: #B0BEC5; border-bottom-color: #78909C; }         /* Grey - Other */

        /* Answer blocks use SAME colors */
        .answer-word-block {
            font-family: 'Noto Sans KR', 'Fredoka One', cursive, sans-serif;
            font-size: 22px;
            font-weight: 700;
            padding: 10px 18px;
            color: #1A1A1A;
            display: inline-block;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            position: relative;
            border-radius: 5px;
            border-bottom: 7px solid rgba(0,0,0,0.25);
            box-shadow: 
                inset 0 -4px 0 rgba(0,0,0,0.1),
                0 4px 8px rgba(0,0,0,0.2);
            min-width: 55px;
            text-align: center;
        }

        .answer-word-block::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: inherit;
            border-radius: 50% 50% 0 0;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                0 -2px 0 rgba(0,0,0,0.1);
            filter: brightness(1.15);
        }

        .answer-word-block::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 30%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            background: inherit;
            border-radius: 50% 50% 0 0;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                0 -2px 0 rgba(0,0,0,0.1);
            filter: brightness(1.15);
            display: none;
        }

        .answer-word-block.long-word::after {
            display: block;
        }

        /* Answer blocks use SAME color classes */
        .answer-word-block.color-subject { background: #FFD93D; border-bottom-color: #D4A017; }
        .answer-word-block.color-verb { background: #2ED573; border-bottom-color: #1E8449; }
        .answer-word-block.color-object { background: #FF4757; border-bottom-color: #C0392B; }
        .answer-word-block.color-adverb { background: #A66CFF; border-bottom-color: #7B2FBE; }
        .answer-word-block.color-preposition { background: #FF8E53; border-bottom-color: #D35400; }
        .answer-word-block.color-article { background: #F9A8D4; border-bottom-color: #C71585; }
        .answer-word-block.color-adjective { background: #1E90FF; border-bottom-color: #1565C0; }
        .answer-word-block.color-conjunction { background: #00D2D3; border-bottom-color: #00838F; }
        .answer-word-block.color-other { background: #B0BEC5; border-bottom-color: #78909C; }

        .answer-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: none;
            flex-shrink: 0;
            border: 3px solid #4ECDC4;
        }

        .answer-label {
            font-family: 'Fredoka One', cursive;
            font-size: 18px;
            color: #4ECDC4;
            margin-bottom: 8px;
        }

        .answer-blocks {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px 14px;
            padding: 5px;
            min-height: 60px;
        }

        .team-stats {
            display: flex;
            justify-content: center;
            margin: 8px 0;
            padding: 10px;
            background: linear-gradient(145deg, #FFD700, #FDB931);
            border-radius: 16px;
            color: #1A3A5F;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 20px;
            flex-shrink: 0;
        }

        .team-stat {
            font-size: 16px;
            text-align: center;
            min-width: 100px;
        }

        .team-stat span { font-size: 20px; margin-right: 6px; }
        .team-stat input {
            width: 50px;
            padding: 4px;
            font-size: 14px;
            text-align: center;
            font-family: 'Fredoka One', cursive;
            border: 2px solid #1A3A5F;
            border-radius: 8px;
            margin-left: 6px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
            padding: 10px 0 3px 0;
            background: white;
            border-top: 2px solid #f0f0f0;
            flex-shrink: 0;
        }

        .control-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: all 0.1s ease;
            min-width: 100px;
        }

        .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .btn-show { background: #4ECDC4; box-shadow: 0 4px 0 #2A8F87; }
        .btn-next { background: #FFD700; color: #333; box-shadow: 0 4px 0 #C4A000; }
        .btn-home { background: #95a5a6; box-shadow: 0 4px 0 #6C7A7D; }

        .hidden { display: none !important; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 35px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: modalPop 0.5s ease-out;
            border: 5px solid #FFD700;
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon { font-size: 50px; margin-bottom: 12px; }
        .modal-content h2 { font-family: 'Fredoka One', cursive; font-size: 30px; color: #1A3A5F; margin-bottom: 12px; }
        .modal-content p { font-size: 18px; margin-bottom: 20px; color: #333; }

        .modal-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 18px;
            padding: 10px 30px;
            background: linear-gradient(145deg, #1A3A5F, #0F2A44);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #0A1A2F;
        }

        .modal-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0A1A2F; }

        @media (max-width: 900px) {
            .word-block, .answer-word-block {
                font-size: 18px;
                padding: 8px 14px;
                min-width: 45px;
                border-bottom-width: 6px;
            }
            .word-block::before, .answer-word-block::before {
                width: 16px;
                height: 8px;
                top: -8px;
            }
            .word-block::after, .answer-word-block::after {
                width: 16px;
                height: 8px;
                top: -8px;
            }
            .word-cloud {
                padding: 15px 12px;
                min-height: 120px;
                gap: 10px 12px;
            }
            .answer-blocks {
                gap: 8px 10px;
                min-height: 45px;
            }
            .stage-title { font-size: 20px; }
            .question-container {
                padding: 12px 15px;
                max-height: 95vh;
            }
            .team-stat { font-size: 14px; min-width: 80px; }
            .team-stat span { font-size: 18px; }
            .team-stat input { width: 45px; font-size: 13px; }
            .control-btn { font-size: 14px; padding: 7px 16px; min-width: 80px; }
        }

        @media (max-width: 600px) {
            .word-block, .answer-word-block {
                font-size: 15px;
                padding: 6px 10px;
                min-width: 35px;
                border-bottom-width: 5px;
                border-radius: 4px;
            }
            .word-block::before, .answer-word-block::before {
                width: 12px;
                height: 6px;
                top: -6px;
            }
            .word-block::after, .answer-word-block::after {
                width: 12px;
                height: 6px;
                top: -6px;
            }
            .word-cloud {
                padding: 12px 8px;
                min-height: 100px;
                gap: 8px 10px;
            }
            .answer-blocks {
                gap: 6px 8px;
                min-height: 35px;
            }
            .stage-title { font-size: 18px; }
            .sub-title { font-size: 11px; }
            .question-number { font-size: 14px; }
            .question-container {
                padding: 10px 12px;
                max-height: 92vh;
                border-radius: 18px;
            }
            .answer-label { font-size: 15px; }
            .team-stats { gap: 12px; padding: 8px; }
            .team-stat { font-size: 12px; min-width: 60px; }
            .team-stat span { font-size: 15px; }
            .team-stat input { width: 38px; font-size: 11px; padding: 3px; }
            .controls { gap: 6px; padding: 8px 0 2px 0; }
            .control-btn { font-size: 12px; padding: 6px 12px; min-width: 60px; }
            .answer-section { padding: 8px 10px; }
        }

        @media (max-height: 700px) {
            .word-cloud {
                min-height: 80px;
                padding: 12px 10px;
            }
            .word-block, .answer-word-block {
                font-size: 16px;
                padding: 6px 12px;
                min-width: 40px;
                border-bottom-width: 5px;
            }
            .word-block::before, .answer-word-block::before {
                width: 14px;
                height: 7px;
                top: -7px;
            }
            .word-block::after, .answer-word-block::after {
                width: 14px;
                height: 7px;
                top: -7px;
            }
            .answer-blocks {
                min-height: 30px;
                gap: 6px 8px;
            }
            .stage-title { font-size: 18px; }
            .question-container {
                padding: 8px 12px;
                max-height: 98vh;
            }
            .team-stats { padding: 6px; margin: 4px 0; }
            .controls { padding: 6px 0 2px 0; margin-top: 4px; }
            .answer-section { padding: 6px 10px; }
        }
    </style>
</head>
<body>

<div class="question-container">
    <h1 class="stage-title">🧩 PATTERN BUILDER</h1>
    <div class="sub-title">🇰🇷 Korean Words → English Sentences</div>
    <div class="class-badge" id="classDisplay">Class: <span>2:00 PM Class (A1)</span></div>

    <div class="question-number" id="questionNumber"></div>

    <!-- WORD CLOUD - LEGO blocks with Korean words -->
    <div class="word-cloud" id="wordCloud"></div>

    <div class="team-stats" id="teamStats">
        <div class="team-stat"><span>🔴 Team A</span> <input type="number" id="scoreA" value="0" min="0" step="1"></div>
        <div class="team-stat"><span>🔵 Team B</span> <input type="number" id="scoreB" value="0" min="0" step="1"></div>
    </div>

    <div class="answer-section" id="answerSection">
        <div class="answer-label">✓ CORRECT ENGLISH SENTENCE</div>
        <div class="answer-blocks" id="answerBlocks"></div>
    </div>

    <div class="controls">
        <button class="control-btn btn-show" id="showAnswerBtn">Show Answer</button>
        <button class="control-btn btn-next hidden" id="nextBtn">Next ➤</button>
        <button class="control-btn btn-home" onclick="location.href='index.html'">Home</button>
    </div>
</div>

<div class="modal-overlay" id="timesUpModal">
    <div class="modal-content">
        <div class="modal-icon">⏰</div>
        <h2>TIME'S UP!</h2>
        <p>The team battle has ended</p>
        <button class="modal-btn" id="modalOkBtn">OK</button>
    </div>
</div>

<div class="modal-overlay" id="completeModal">
    <div class="modal-content">
        <div class="modal-icon">🏆</div>
        <h2>BATTLE COMPLETE!</h2>
        <p>Great job, teams!</p>
        <button class="modal-btn" id="completeOkBtn">OK</button>
    </div>
</div>

    { 
        scrambled: "나는 내년에 4학년이 될 거야", 
        correct: "I'm going to be in fourth grade next year",
        colorMap: {
            // Korean
            '나는': 'color-subject',
            '내년에': 'color-other',
            '4학년이': 'color-adjective',
            '될': 'color-verb',
            '거야': 'color-verb',
            // English
            "i'm": 'color-subject',
            'going': 'color-verb',
            'to': 'color-verb',
            'be': 'color-verb',
            'in': 'color-other',
            'fourth': 'color-adjective',
            'grade': 'color-adjective',
            'next': 'color-other',
            'year': 'color-other'
        }
    }
];

// ===== COLOR MAPPING FUNCTION =====
// Each word gets a color based on its grammatical role
// Korean and English words with the SAME role get the SAME color!
function getWordColor(word, isKorean = true) {
    const w = word.toLowerCase().trim();
    
    // ----- SUBJECT (Yellow) -----
    const koreanSubjects = ['나는', '저는', '그는', '그녀는', '우리는', '내가', '제가', '네가', '우리가'];
    const englishSubjects = ['i', "i'm", 'you', 'he', 'she', 'it', 'we', 'they'];
    if (koreanSubjects.includes(w) || englishSubjects.includes(w)) {
        return 'color-subject';
    }
    
    // ----- PREPOSITION (Orange) ===== "to" goes here, not verb
    const koreanPreps = ['창가에', '가족과', '에게', '에', '와', '와는', '로', '부터', '까지', '밖에서'];
    const englishPreps = ['by', 'with', 'in', 'to', 'at', 'on', 'for', 'from', 'of', 'out', 'outside'];
    if (koreanPreps.includes(w) || englishPreps.includes(w)) {
        return 'color-preposition';
    }
    
    // ----- OBJECT (Red) ===== CHECK BEFORE VERBS so compound words like "샤워할" match "샤워" first
    const koreanObjects = ['친구들을', '친구들', '할머니', '할아버지를', '수영하는', '것을', '4학년이', '4학년', '샤워'];
    const englishObjects = ['friends', 'grandparents', 'shower', 'window', 'family', 'swim', 'fourth', 'grade'];
    if (koreanObjects.some(o => w === o || w.includes(o)) || englishObjects.some(o => w === o)) {
        return 'color-adjective';
    }
    
    // ----- VERB (Green) -----
    const koreanVerbs = ['놀', '만날', '공부할', '방문할', '샤워할', '앉을', '외식할', '배울', '될', '거야', '갑니다', '읽습니다', '합니다', '먹습니다', '잡니다', '봅니다', '마십니다', '간다', '한다'];
    const englishVerbs = ['go', 'going', 'play', 'meet', 'study', 'visit', 'take', 'sit', 'eat', 'learn', 'swim', 'be', 'being'];
    if (koreanVerbs.some(v => w === v || w.includes(v)) || englishVerbs.includes(w)) {
        return 'color-verb';
    }
    
    // ----- ADVERB (Purple) -----
    const koreanAdverbs = ['더', '열심히', '내년에', '다음', '내년', '년'];
    const englishAdverbs = ['harder', 'next', 'year'];
    if (koreanAdverbs.includes(w) || englishAdverbs.includes(w)) {
        return 'color-adverb';
    }
    
    // ----- ARTICLE (Pink) -----
    const englishArticles = ['a', 'an', 'the'];
    if (englishArticles.includes(w)) {
        return 'color-article';
    }
    
    // ----- ADJECTIVE (Blue) -----
    const koreanAdjectives = ['새로운', '큰', '작은', '예쁜', '못생긴', '좋은', '나쁜'];
    const englishAdjectives = ['my', 'your', 'his', 'her', 'their', 'new', 'big', 'small', 'good', 'bad', 'pretty', 'ugly'];
    if (koreanAdjectives.includes(w) || englishAdjectives.includes(w)) {
        return 'color-adjective';
    }
    
    // Default
    return 'color-other';
}

// Shuffle array
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Render Korean word cloud
function renderWordCloud(sentence, colorMap) {
    const words = sentence.split(/\s+/).filter(w => w.length > 0);
    const container = $('#wordCloud');
    container.empty();
    
    const shuffledWords = shuffleArray([...words]);
    
    shuffledWords.forEach((word, index) => {
        const colorClass = colorMap && colorMap[word.toLowerCase()] ? colorMap[word.toLowerCase()] : 'color-other';
        const block = $('<span class="word-block"></span>')
            .addClass(colorClass)
            .text(word)
            .css('animation-delay', (index * 0.06) + 's');
        
        if (word.length >= 3) {
            block.addClass('long-word');
        }
        
        container.append(block);
    });
}

// Render English answer with matching colors
function renderAnswer(sentence, colorMap) {
    const words = sentence.split(/\s+/).filter(w => w.length > 0);
    const container = $('#answerBlocks');
    container.empty();
    
    words.forEach((word, index) => {
        const colorClass = colorMap && colorMap[word.toLowerCase()] ? colorMap[word.toLowerCase()] : 'color-other';
        const block = $('<span class="answer-word-block"></span>')
            .addClass(colorClass)
            .text(word)
            .css('animation-delay', (index * 0.06) + 's');
        
        if (word.length >= 6) {
            block.addClass('long-word');
        }
        
        container.append(block);
    });
}

// Game logic
let questions = [];
let currentIndex = 0;
let timerTimeout;

$(document).ready(function () {
    questions = shuffleArray([...SAMPLE_QUESTIONS]);
    console.log('Questions loaded. Total:', questions.length);
    showQuestion();
});

function showQuestion() {
    if (currentIndex >= questions.length) {
        clearTimeout(timerTimeout);
        showCompleteModal();
        return;
    }

    const q = questions[currentIndex];
    $('#questionNumber').text(`Question ${currentIndex + 1} of ${questions.length}`);
    renderWordCloud(q.scrambled, q.colorMap);
    renderAnswer(q.correct, q.colorMap);

    $('#answerSection').hide();
    $('#showAnswerBtn').removeClass('hidden');
    $('#nextBtn').addClass('hidden');
}

function showTimesUpModal() {
    clearTimeout(timerTimeout);
    $('#timesUpModal').fadeIn(300).css('display', 'flex');
}

function showCompleteModal() {
    $('#completeModal').fadeIn(300).css('display', 'flex');
}

$('#showAnswerBtn').on('click', function () {
    $('#answerSection').slideDown(200);
    $(this).addClass('hidden');
    $('#nextBtn').removeClass('hidden');
});

$('#nextBtn').on('click', function () {
    currentIndex++;
    showQuestion();
});

$('#modalOkBtn, #completeOkBtn').on('click', function() {
    location.href = 'index.html';
});

window.addEventListener('beforeunload', function() {
    clearTimeout(timerTimeout);
});
</script>
